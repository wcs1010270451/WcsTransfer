services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wcstransfer}
      POSTGRES_USER: ${POSTGRES_USER:-wcstransfer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wcstransfer} -d ${POSTGRES_DB:-wcstransfer}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  postgres-backup:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-wcstransfer}
      POSTGRES_USER: ${POSTGRES_USER:-wcstransfer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_PREFIX: ${BACKUP_PREFIX:-wcstransfer}
    volumes:
      - ./deploy/backup/backup-postgres.sh:/scripts/backup-postgres.sh:ro
      - ./deploy/backup/restore-postgres.sh:/scripts/restore-postgres.sh:ro
      - postgres_backup_data:/backups
    entrypoint: ["/bin/sh", "/scripts/backup-postgres.sh"]
    restart: unless-stopped

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-wcstransfer}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wcstransfer}?sslmode=disable
    volumes:
      - ./backend/migrations:/migrations:ro
      - ./backend/scripts/run-migrations.sh:/scripts/run-migrations.sh:ro
    entrypoint: ["/bin/sh", "/scripts/run-migrations.sh"]
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_NAME: ${APP_NAME:-wcstransfer-gateway}
      HTTP_PORT: 8080
      GIN_MODE: ${GIN_MODE:-release}
      ENABLE_DOCS: ${ENABLE_DOCS:-false}
      ENABLE_ADMIN_DEBUG: ${ENABLE_ADMIN_DEBUG:-false}
      ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      ADMIN_BOOTSTRAP_DISPLAY_NAME: ${ADMIN_BOOTSTRAP_DISPLAY_NAME:-Platform Admin}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?set AUTH_TOKEN_SECRET}
      DATABASE_URL: postgres://${POSTGRES_USER:-wcstransfer}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wcstransfer}?sslmode=disable
      DATABASE_MAX_CONNS: ${DATABASE_MAX_CONNS:-20}
      DATABASE_MIN_CONNS: ${DATABASE_MIN_CONNS:-2}
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      DEPENDENCY_TIMEOUT: ${DEPENDENCY_TIMEOUT:-3s}
      HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-15s}
      HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-120s}
      HTTP_SHUTDOWN_TIMEOUT: ${HTTP_SHUTDOWN_TIMEOUT:-15s}
      RECONCILIATION_ENABLED: ${RECONCILIATION_ENABLED:-true}
      RECONCILIATION_INTERVAL: ${RECONCILIATION_INTERVAL:-1h}
      RECONCILIATION_DIFF_THRESHOLD: ${RECONCILIATION_DIFF_THRESHOLD:-0.0001}
      PROVIDER_ALERT_ENABLED: ${PROVIDER_ALERT_ENABLED:-true}
      PROVIDER_ALERT_WINDOW: ${PROVIDER_ALERT_WINDOW:-5m}
      PROVIDER_ALERT_INTERVAL: ${PROVIDER_ALERT_INTERVAL:-1m}
      PROVIDER_ALERT_MIN_REQUESTS: ${PROVIDER_ALERT_MIN_REQUESTS:-10}
      PROVIDER_ALERT_429_THRESHOLD: ${PROVIDER_ALERT_429_THRESHOLD:-0.2}
      PROVIDER_ALERT_5XX_THRESHOLD: ${PROVIDER_ALERT_5XX_THRESHOLD:-0.2}
      TENANT_WALLET_ALERT_ENABLED: ${TENANT_WALLET_ALERT_ENABLED:-true}
      TENANT_WALLET_ALERT_WINDOW: ${TENANT_WALLET_ALERT_WINDOW:-5m}
      TENANT_WALLET_ALERT_INTERVAL: ${TENANT_WALLET_ALERT_INTERVAL:-1m}
      TENANT_WALLET_ALERT_MIN_BLOCKS: ${TENANT_WALLET_ALERT_MIN_BLOCKS:-5}
      TENANT_RESERVE_ALERT_MIN_BLOCKS: ${TENANT_RESERVE_ALERT_MIN_BLOCKS:-5}
      BILLING_ALERT_ENABLED: ${BILLING_ALERT_ENABLED:-true}
      BILLING_ALERT_WINDOW: ${BILLING_ALERT_WINDOW:-10m}
      BILLING_ALERT_INTERVAL: ${BILLING_ALERT_INTERVAL:-1m}
      BILLING_ALERT_MIN_COUNT: ${BILLING_ALERT_MIN_COUNT:-1}
      BILLING_ALERT_MIN_AMOUNT: ${BILLING_ALERT_MIN_AMOUNT:-0.01}
      DEPENDENCY_ALERT_ENABLED: ${DEPENDENCY_ALERT_ENABLED:-true}
      DEPENDENCY_ALERT_INTERVAL: ${DEPENDENCY_ALERT_INTERVAL:-1m}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_WEBHOOK_PROVIDER: ${ALERT_WEBHOOK_PROVIDER:-generic}
      ALERT_WEBHOOK_TIMEOUT: ${ALERT_WEBHOOK_TIMEOUT:-5s}
      CORS_ALLOWED_ORIGINS: ${PUBLIC_BASE_URL:-https://api.example.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${PUBLIC_BASE_URL:-https://api.example.com}
        VITE_APP_BASE_PATH: /console/
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-ops@example.com}
      ADMIN_UI_USER: ${ADMIN_UI_USER:?set ADMIN_UI_USER}
      ADMIN_UI_PASSWORD_HASH: ${ADMIN_UI_PASSWORD_HASH:?set ADMIN_UI_PASSWORD_HASH}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

  healthz-monitor:
    image: curlimages/curl:8.8.0
    depends_on:
      caddy:
        condition: service_started
    environment:
      APP_NAME: ${APP_NAME:-wcstransfer-gateway}
      HEALTHCHECK_URL: ${HEALTHCHECK_URL:-http://caddy/healthz}
      HEALTHCHECK_INTERVAL: ${HEALTHCHECK_INTERVAL:-30}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      ALERT_WEBHOOK_PROVIDER: ${ALERT_WEBHOOK_PROVIDER:-generic}
    volumes:
      - ./deploy/monitoring/healthz-watch.sh:/scripts/healthz-watch.sh:ro
    entrypoint: ["/bin/sh", "/scripts/healthz-watch.sh"]
    restart: unless-stopped

volumes:
  postgres_prod_data:
  postgres_backup_data:
  redis_prod_data:
  caddy_data:
  caddy_config:
