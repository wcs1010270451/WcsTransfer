services:
  postgres:
    image: postgres:16-alpine
    container_name: wcstransfer-postgres
    environment:
      POSTGRES_DB: wcstransfer
      POSTGRES_USER: wcstransfer
      POSTGRES_PASSWORD: wcstransfer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/0001_init.up.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wcstransfer -d wcstransfer"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: wcstransfer-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wcstransfer-backend
    environment:
      APP_ENV: development
      APP_NAME: wcstransfer-gateway
      HTTP_PORT: 8080
      GIN_MODE: debug
      ADMIN_TOKEN: change-me
      DATABASE_URL: postgres://wcstransfer:wcstransfer@postgres:5432/wcstransfer?sslmode=disable
      DATABASE_MAX_CONNS: 20
      DATABASE_MIN_CONNS: 2
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      DEPENDENCY_TIMEOUT: 3s
      HTTP_READ_TIMEOUT: 15s
      HTTP_WRITE_TIMEOUT: 60s
      HTTP_SHUTDOWN_TIMEOUT: 10s
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
